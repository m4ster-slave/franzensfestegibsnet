services:
  app:
    image: ${APP_IMAGE:-ghcr.io/m4ster-slave/franzensfestegibsnet:latest}
    container_name: franzensfestegibsnet-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-franzensfestegibsnet}
      ROCKET_SECRET_KEY: ${ROCKET_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-12582912}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads

  db:
    image: postgres:16
    container_name: franzensfestegibsnet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-franzensfestegibsnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-franzensfestegibsnet}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
