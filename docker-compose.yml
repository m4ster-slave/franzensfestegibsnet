services:
  app:
    build: .
    container_name: franzensfestegibsnet-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/franzensfestegibsnet
      ROCKET_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.local
      ADMIN_PASSWORD: change-me-now
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_BYTES: 5242880
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  db:
    image: postgres:16
    container_name: franzensfestegibsnet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: franzensfestegibsnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d franzensfestegibsnet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
